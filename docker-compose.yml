version: '3.8'

networks:
  platform_network:
    driver: bridge

services:
  # Central Relational Database for metrics, logs, and clinical metadata
  postgres_db:
    image: postgres:15-alpine
    container_name: platform_postgres
    environment:
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_password
      POSTGRES_DB: cross_hospital_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/data/postgresql
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - platform_network
    restart: always

  # Central MLOps Model Registry and Tracking Server
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: platform_mlflow
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://platform_user:platform_password@postgres_db:5432/cross_hospital_platform
      - ARTIFACT_ROOT=s3://mlflow-artifacts/
      # Connect MLflow to MinIO as an S3-compatible object storage backend
      - AWS_ACCESS_KEY_ID=minio_admin_user
      - AWS_SECRET_ACCESS_KEY=minio_admin_password
      - MLFLOW_S3_ENDPOINT_URL=http://minio_storage:9000
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - ./deployment/mlflow/artifacts:/mlflow/artifacts
    command: >
      mlflow server 
      --backend-store-uri postgresql://platform_user:platform_password@postgres_db:5432/cross_hospital_platform
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    depends_on:
      - postgres_db
      - minio_storage
    networks:
      - platform_network
    restart: always

  # High-performance S3-compatible Object Storage for DICOM, NIFTI, and JPG medical images
  minio_storage:
    image: minio/minio:RELEASE.2024-01-28T22-34-53Z
    container_name: platform_minio
    ports:
      - "9000:9000"       # API Port
      - "9001:9001"       # Web Console Port
    environment:
      MINIO_ROOT_USER: minio_admin_user
      MINIO_ROOT_PASSWORD: minio_admin_password
    volumes:
      - minio_data:/data
    networks:
      - platform_network
    # Auto-provision required application buckets on startup
    command: >
      server /data --console-address ":9001" & 
      echo "Waiting for MinIO..." && 
      sleep 5 && 
      mc alias set myminio http://localhost:9000 minio_admin_user minio_admin_password && 
      mc mb --ignore-existing myminio/medical-images && 
      mc mb --ignore-existing myminio/mlflow-artifacts &&
      wait
    restart: always

volumes:
  pg_data:
  minio_data: