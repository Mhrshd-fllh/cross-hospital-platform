version: '3.8'

networks:
  platform_network:
    driver: bridge

services:
  # Central Relational Database for metrics, logs, and clinical metadata
  postgres_db:
    image: postgres:15-alpine
    container_name: platform_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/data/postgresql
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - platform_network
    restart: always

  # Central MLOps Model Registry and Tracking Server
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: platform_mlflow
    ports:
      - "${MLFLOW_TRACKING_PORT}:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - ARTIFACT_ROOT=s3://mlflow-artifacts/
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      - MLFLOW_S3_IGNORE_TLS=${MLFLOW_S3_IGNORE_TLS}
    volumes:
      - ./deployment/mlflow/artifacts:/mlflow/artifacts
    command: >
      mlflow server 
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    depends_on:
      - postgres_db
      - minio_storage
    networks:
      - platform_network
    restart: always

  # High-performance S3-compatible Object Storage for DICOM, NIFTI, and JPG medical images
  minio_storage:
    image: minio/minio:RELEASE.2024-01-28T22-34-53Z
    container_name: platform_minio
    ports:
      - "${MINIO_API_PORT}:9000"       # API Port
      - "${MINIO_CONSOLE_PORT}:9001"   # Web Console Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - platform_network
    # Auto-provision required application buckets on startup using env variables
    command: >
      server /data --console-address ":9001" & 
      echo "Waiting for MinIO..." && 
      sleep 5 && 
      mc alias set myminio http://localhost:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && 
      mc mb --ignore-existing myminio/medical-images && 
      mc mb --ignore-existing myminio/mlflow-artifacts &&
      wait
    restart: always

volumes:
  pg_data:
  minio_data: